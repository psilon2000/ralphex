name: build

on:
  push:
    branches:
    tags:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
        id: go

      - name: checkout
        uses: actions/checkout@v6

      - name: build and test
        run: |
          go test -race -timeout=100s -covermode=atomic -coverprofile=$GITHUB_WORKSPACE/profile.cov_tmp ./...
          grep -v -E "_mock.go|/mocks/" $GITHUB_WORKSPACE/profile.cov_tmp > $GITHUB_WORKSPACE/profile.cov

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: submit coverage
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/profile.cov
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-cli-compat:
    runs-on: ubuntu-latest
    steps:
      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: checkout
        uses: actions/checkout@v6
      - name: run cli compatibility unit tests
        run: >-
          go test ./cmd/ralphex
          -run 'TestDetermineMode|TestValidateFlags|TestUseOpencodeAdapter|TestSupportsOpencodeAdapterMode'

  integration-opencode-adapter:
    runs-on: ubuntu-latest
    steps:
      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: checkout
        uses: actions/checkout@v6
      - name: run adapter integration tests
        run: >-
          go test ./cmd/ralphex
          -run 'TestRunTaskPhaseRunsPendingTasks|TestRunTaskPhasePropagatesRunnerError|TestRunTaskPhaseRequiresPlan|TestValidateTaskOutput|TestRunReviewPhase|TestRunReviewPhaseDiffError|TestBuildReviewPrompt|TestGitDiffOutput'

  e2e-cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: checkout
        uses: actions/checkout@v6
      - name: run adapter command smoke
        run: go test ./cmd/ralphex -run 'TestExecOpencodeRunnerSmoke'
